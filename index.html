<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimulatorHNT - Hanuthai Personalizações</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --card-bg: rgba(20, 20, 20, 0.85);
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            /* Fundo estilo IndexFAQ (Logo HNT com gradiente) */
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), #000), url('assets/Galeria/HanuthaiLogo/LogoHanuthai.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Link discreto para FAQ no topo */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 100;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .nav-link:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        /* Container da Grid Centralizada */
        .main-container {
            width: 100%;
            max-width: 1600px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            color: #fff;
            text-transform: uppercase;
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center;
            font-weight: 800;
            border-bottom: 3px solid var(--gold);
            padding-bottom: 10px;
            display: inline-block;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            justify-content: center;
        }

        /* Cards Minimalistas */
        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .card-image-wrapper {
            height: 300px;
            /* Altura maior para destaque */
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            opacity: 0.9;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
            opacity: 1;
        }

        .card-content {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-name {
            color: #fff;
            font-size: 1.4rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .product-cta {
            display: inline-block;
            padding: 12px 0;
            width: 100%;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            text-decoration: none;
            font-weight: 700;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .product-card:hover .product-cta {
            background: var(--gold);
            color: #000;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .section-title {
                font-size: 1.5rem;
            }

            .card-image-wrapper {
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="IndexFaq.html" class="nav-link">Central de Ajuda</a>
        <a href="IndexPosVenda.html" class="nav-link">Pós-Venda</a>
        <a href="IndexAdministrarPedidoSimulador.html" class="nav-link" style="margin-left: 10px;">Admin</a>
    </nav>

    <main class="main-container">
        <h1 class="section-title">Escolha seu Modelo</h1>

        <div class="products-grid">
            <!-- Fight Shorts -->
            <div class="product-card" onclick="window.location.href='IndexFightShorts.html'">
                <div class="card-image-wrapper">
                    <img src="Gif/ShortsFight.gif" alt="Fight Shorts" class="product-image">
                </div>
                <div class="card-content">
                    <h3 class="product-name">Fight Shorts</h3>
                    <a href="IndexFightShorts.html" class="product-cta">Personalizar</a>
                </div>
            </div>

            <!-- Shorts Legging -->
            <div class="product-card" onclick="window.location.href='IndexShortsLegging.html'">
                <div class="card-image-wrapper">
                    <img src="Gif/ShortsLegging.gif" alt="Shorts Legging" class="product-image">
                </div>
                <div class="card-content">
                    <h3 class="product-name">Shorts Legging</h3>
                    <a href="IndexShortsLegging.html" class="product-cta">Personalizar</a>
                </div>
            </div>

            <!-- Legging -->
            <div class="product-card" onclick="window.location.href='IndexCalcaLegging.html'">
                <div class="card-image-wrapper">
                    <img src="Gif/CalcaLegging.gif" alt="Calça Legging" class="product-image">
                </div>
                <div class="card-content">
                    <h3 class="product-name">Calça Legging</h3>
                    <a href="IndexCalcaLegging.html" class="product-cta">Personalizar</a>
                </div>
            </div>

            <!-- Moletom -->
            <div class="product-card" onclick="window.location.href='IndexMoletom.html'">
                <div class="card-image-wrapper">
                    <img src="Gif/Moletom.gif" alt="Moletom" class="product-image">
                </div>
                <div class="card-content">
                    <h3 class="product-name">Moletom</h3>
                    <a href="IndexMoletom.html" class="product-cta">Personalizar</a>
                </div>
            </div>

            <!-- Top -->
            <div class="product-card" onclick="window.location.href='IndexTop.html'">
                <div class="card-image-wrapper">
                    <img src="Gif/Top.gif" alt="Top" class="product-image">
                </div>
                <div class="card-content">
                    <h3 class="product-name">Top</h3>
                    <a href="IndexTop.html" class="product-cta">Personalizar</a>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
