<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://sflllqfytzpwgnaksvkj.supabase.co; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://sflllqfytzpwgnaksvkj.supabase.co; connect-src 'self' https://sflllqfytzpwgnaksvkj.supabase.co wss://sflllqfytzpwgnaksvkj.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Hanuthai Simulador</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --bg: #000;
            --card: #080808;
            --input-bg: #0d0d0d;
            --border: #2a2a2a;
            --text: #fff;
            --muted: #888;
            --danger: #ff4d4d;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ── */
        header {
            width: 100%;
            background: #000;
            border-bottom: 1px solid var(--border);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-logo {
            height: 44px;
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
            font-size: 2rem;
            letter-spacing: 3px;
            margin-left: 16px;
        }

        .header-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 1.1rem;
            text-decoration: none;
            color: #555;
            transition: all 0.2s ease;
        }

        .header-back:hover {
            color: var(--gold);
        }

        /* ── CARD ── */
        .login-card {
            margin: 60px auto;
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .card-sub {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* ── GOOGLE BTN ── */
        .btn-google {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .btn-google img {
            width: 20px;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── INPUTS ── */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .input-field::placeholder {
            color: #444;
        }

        /* ── PASSWORD TOGGLE ── */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .input-field {
            padding-right: 44px;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color 0.2s;
        }

        .toggle-pw:hover {
            color: var(--gold);
        }

        /* ── SUBMIT BTN ── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.2);
        }

        .btn-submit:hover {
            background: #ffe84d;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.35);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── ERROR ── */
        #login-error {
            display: none;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-top: 16px;
        }

        /* ── LINKS ── */
        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.8;
        }

        .footer-links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 30px 16px;
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>

    <header
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; position: relative; width: 100%;">
        <div style="flex: 1; display: flex; justify-content: flex-start;">
            <a href="index.html" class="header-back" title="Início">🏠</a>
        </div>
        <div style="flex: 2; display: flex; justify-content: center; align-items: center; gap: 15px;">
            <img src="assets/Galeria/HanuthaiLogo/logohnttexte.png" alt="Hanuthai" class="header-logo"
                style="height: 40px; width: auto; object-fit: contain;">
            <span class="header-title" style="margin: 0;">LOGIN</span>
        </div>
        <div class="header-right" id="header-right" style="flex: 1; display: flex; justify-content: flex-end;">
            <span
                style="font-size:0.75rem; color:#444; font-weight: bold; border: 1px solid #222; padding: 2px 8px; border-radius: 4px;">v14.68</span>
        </div>
    </header>

    <div class="login-card">
        <div class="card-title">Bem-vindo de volta</div>
        <div class="card-sub">Entre para continuar no simulador HNT</div>

        <!-- Google OAuth -->
        <button id="btn-google" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            ENTRAR COM GOOGLE
        </button>

        <div class="divider">ou use seu e-mail</div>

        <!-- Email/Password Form -->
        <form id="login-form" autocomplete="on">
            <div class="input-group">
                <label class="input-label" for="login-email">E-mail ou Usuário</label>
                <input type="text" id="login-email" class="input-field" placeholder="seu@email.com ou usuário"
                    autocomplete="email" required>
            </div>

            <div class="input-group">
                <label class="input-label" for="login-password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" class="input-field" placeholder="••••••••"
                        autocomplete="current-password" required>
                    <button type="button" class="toggle-pw" id="toggle-pw-btn" title="Mostrar/ocultar senha">👁</button>
                    <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="show-password" style="width: auto; margin: 0; cursor: pointer;">
                        <label for="show-password"
                            style="margin: 0; font-size: 0.8em; cursor: pointer; color: #888;">Mostrar senha</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">🔐 ENTRAR</button>

            <div id="login-error">⚠️ <span id="login-error-msg"></span></div>
        </form>

        <div class="footer-links">
            <div>Não tem conta? <a href="indexCadastro.html">Criar cadastro</a></div>
            <div style="margin-top: 6px;"><a href="IndexPedidoSimulador.html">← Voltar ao simulador</a></div>
        </div>
    </div>

    <!-- Supabase -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/modules/auth/supabase-client.js?v=14.63"></script>

    <script>
        // ── Redirect logic ──────────────────────────────────────────────────
        function getRedirectTarget() {
            const params = new URLSearchParams(window.location.search);
            const r = params.get('redirect');
            if (r && r.startsWith('/')) return r;
            return 'IndexPedidoSimulador.html';
        }

        // ── If already logged in, redirect immediately ──────────────────────
        (async () => {
            const sb = window.supabaseClient;
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = getRedirectTarget();
        })();

        // ── Google OAuth ────────────────────────────────────────────────────
        document.getElementById('btn-google').addEventListener('click', async () => {
            const sb = window.supabaseClient;
            if (!sb) return;
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/' + getRedirectTarget() }
            });
            if (error) showError('Falha ao conectar com Google. Tente novamente.');
        });

        // ── Email/Password Login ────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) return;

            btn.disabled = true;
            btn.textContent = '🕒 ENTRANDO...';
            hideError();

            const sb = window.supabaseClient;
            if (!sb) { showError('Erro de conexão. Recarregue a página.'); btn.disabled = false; return; }

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                btn.disabled = false;
                btn.innerHTML = '🔐 ENTRAR';
                const msg = error.message.includes('Invalid')
                    ? 'E-mail ou senha incorretos.'
                    : error.message;
                showError(msg);
                return;
            }

            // Login OK — fetch profile from clientes_cadastrados and save locally
            if (data.session?.user) {
                try {
                    const userId = data.session.user.id;
                    const { data: profile } = await sb
                        .from('clientes_cadastrados')
                        .select('*')
                        .eq('auth_user_id', userId)
                        .maybeSingle();

                    if (profile) {
                        localStorage.setItem('hnt_customer_profile', JSON.stringify({
                            name: profile.nome_comprador,
                            email: profile.email_comprador,
                            document: profile.cpf_cnpj_comprador,
                            whatsapp: profile.celular_comprador,
                            phone: profile.telefone_comprador,
                            address: profile.endereco_comprador,
                            neighborhood: profile.bairro_comprador,
                            number: profile.numero_comprador,
                            complement: profile.complemento_comprador,
                            zipcode: profile.cep_comprador,
                            city: profile.cidade_comprador,
                            state: profile.uf_comprador,
                            clientId: profile.id_cliente,
                            authUserId: profile.auth_user_id,
                            updatedAt: profile.atualizado_em
                        }));
                    }
                } catch (_) { }
            }

            window.location.href = getRedirectTarget();
        });

        // ── Toggle password visibility ──────────────────────────────────────
        const pwToggleBtn = document.getElementById('toggle-pw-btn');
        const pwToggleCheck = document.getElementById('show-password');
        const pwField = document.getElementById('login-password');

        const toggleShow = () => {
            const isVisible = (pwToggleCheck && pwToggleCheck.checked);
            console.log('👁 IndexLogin: Alternando visibilidade:', isVisible);
            pwField.type = isVisible ? 'text' : 'password';
        };

        if (pwToggleBtn) {
            pwToggleBtn.addEventListener('click', () => {
                const nowVisible = pwField.type === 'password';
                pwField.type = nowVisible ? 'text' : 'password';
                if (pwToggleCheck) pwToggleCheck.checked = nowVisible;
            });
        }
        if (pwToggleCheck) {
            pwToggleCheck.addEventListener('change', toggleShow);
            pwToggleCheck.addEventListener('click', toggleShow);
        }


        function showError(msg) {
            const el = document.getElementById('login-error');
            document.getElementById('login-error-msg').textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('login-error').style.display = 'none';
        }
    </script>
</body>

</html>
