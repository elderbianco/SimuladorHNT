        href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Advent+Pro:wght@400;700&family=Alex+Brush&family=Alfa+Slab+One&family=Allerta+Stencil&family=Allura&family=Anton&family=Archivo:wght@400;700&family=Bebas+Neue&family=Black+Ops+One&family=Cabin:wght@400;700&family=Cinzel:wght@400;700&family=Creepster&family=DM+Sans:wght@400;700&family=Dancing+Script:wght@400;700&family=Exo+2:wght@400;700&family=Great+Vibes&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Lobster&family=Merienda:wght@400;700&family=Montserrat:wght@400;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Orbitron:wght@400;700&family=Oswald:wght@400;700&family=Outfit:wght@300;400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Playwrite+Magyarorszag:wght@100..400&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Rubik:wght@400;700&family=Russo+One&family=Sacramento&family=Satisfy&family=Stardos+Stencil:wght@400;700&family=Teko:wght@400;700&family=Ubuntu:wght@400;700&family=Work+Sans:wght@400;700&family=Yellowtail&family=Zilla+Slab:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Estilos Modulares -->
    <!-- Estilos Modulares -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/shorts-style.css?v=400">
    <link rel="stylesheet" href="css/shorts-gallery.css">
    <link rel="stylesheet" href="css/simulator.css?v=202603091900">

<body class="page-top" style="background: #1a1a1a; margin: 0;">
    <!-- Premium Header -->
    <header class="premium-header">
        <div class="header-left">
            <a href="index.html" class="nav-icon" data-tooltip="Início">🏠</a>
            <div class="header-logo-container">
                <img src="assets/Galeria/HanuthaiLogo/LogoHanuthai.jpg" alt="Hanuthai Logo" class="header-logo-img">
            </div>
        </div>

        <div class="header-center">
            <div class="header-env-title">HANUTHAI SIMULADOR TOP</div>
        </div>

        <div class="header-right">
            <div class="mobile-menu-container" id="mobile-sim-menu">
                <button class="mobile-menu-trigger" onclick="this.parentElement.classList.toggle('active')">
                    👕 <small>SIMULADORES</small>
                </button>
                <div class="header-icon-nav">
                    <a href="IndexFightShorts.html" class="nav-icon" data-tooltip="Fight Shorts"><img
                            src="assets/ui-icons/icon-fight-shorts.png" alt="Fight Shorts"></a>
                    <a href="IndexShortsLegging.html" class="nav-icon" data-tooltip="Shorts Legging"><img
                            src="assets/ui-icons/icon-shorts-calca-legging.png" alt="Shorts Legging"></a>
                    <a href="IndexCalcaLegging.html" class="nav-icon" data-tooltip="Calça Legging"><img
                            src="assets/ui-icons/icon-calca-legging.png" alt="Calça Legging"></a>
                    <a href="IndexMoletom.html" class="nav-icon" data-tooltip="Moletom"><img
                            src="assets/ui-icons/icon-moletom.png" alt="Moletom"></a>
                    <a href="IndexTop.html" class="nav-icon active" data-tooltip="Top"><img
                            src="assets/ui-icons/icon-top.png" alt="Top"></a>
                    <a href="IndexFaq.html" class="nav-icon" data-tooltip="FAQ">❓</a>
                </div>
            </div>
            <span
                style="font-size:0.75rem; color:#444; margin-right: 15px; font-weight: bold; border: 1px solid #222; padding: 2px 8px; border-radius: 4px;">v14.30</span>
            <a href="IndexPedidoSimulador.html" class="header-icon" style="text-decoration:none; color: inherit;">
                🛒
                <span class="cart-badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <div class="app-container">
        <!-- Simulator Area -->
        <div class="simulator-area">
            <div class="simulator-viewport">
                <div id="zoom-container" class="zoom-container">
                    <div class="simulator-wrapper">
                        <!-- Base Product Image -->
                        <div class="product-layer">
                            <img id="product-image" src="" alt="Top">
                        </div>

                        <div id="limits-layer" class="product-layer"
                            style="z-index: 1000; pointer-events: none; display: none;"></div>

                        <!-- Customization Layer -->
                        <div id="customization-layer" class="customization-layer">
                            <!-- Dynamic elements will be added here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Zoom Controls -->
            <div class="zoom-controls">
                <button id="zoom-out" class="zoom-btn">-</button>
                <button id="zoom-in" class="zoom-btn">+</button>
                <button id="lock-interaction" class="zoom-btn lock-btn" title="Bloquear/Liberar Interação">🔓</button>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="controls-area">
            <div class="price-header">
                <div style="font-size:0.9rem; color:#666;">Valor Total</div>
                <div id="price-display" style="font-size:2rem; font-weight:bold; color:#D4AF37;">R$ 0,00</div>
            </div>

            <div id="controls-container" style="padding: 10px;">
                <!-- JS Injects Groups -->
            </div>

            <div class="action-bar" style="padding:10px; display:flex; gap:10px;">
                <button id="btn-add-cart" class="btn-primary"
                    style="flex:1; background-color: #28a745; border-color: #28a745;">🛒 Adicionar ao Carrinho</button>
                <button id="btn-pdf" class="btn-primary" style="flex:1;">🖨️ Salvar PDF</button>
            </div>

            <!-- Resumo do Pedido (Inline) -->
            <div id="order-summary-section" style="padding: 15px 10px; border-top: 2px solid #333; margin-top: 15px;">
                <h3
                    style="color: #D4AF37 !important; font-size: 1rem; margin: 0 0 10px 0; text-align: center; text-transform: uppercase;">
                    RESUMO DO PEDIDO</h3>
                <table id="summary-table-inline"
                    style="width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #fff;">
                    <thead>
                        <tr style="border-bottom: 2px solid #444;">
                            <th
                                style="text-align: left; padding: 6px 4px; font-size: 0.75rem; color: #D4AF37 !important;">
                                ITEM</th>
                            <th
                                style="text-align: left; padding: 6px 4px; font-size: 0.75rem; color: #D4AF37 !important;">
                                DETALHE</th>
                            <th
                                style="text-align: right; padding: 6px 4px; font-size: 0.75rem; color: #D4AF37 !important;">
                                R$</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body">
                        <!-- JS populates here -->
                    </tbody>
                </table>
            </div>




        </div>
    </div>

    <!-- Text Modal -->
    <div id="text-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Adicionar Texto</h3>
                <button class="modal-close" onclick="closeTextModal()">×</button>
            </div>
            <div style="padding: 25px;">
                <label class="control-label">Digite o Texto</label>
                <input type="text" id="text-input" class="text-input" placeholder="Digite aqui...">

                <label class="control-label">Fonte</label>
                <select id="font-select" class="font-select">
                    <!-- Fonts from shared database -->
                </select>

                <label class="control-label">Tamanho</label>
                <input type="range" id="text-size" min="20" max="80" value="40" class="text-input">

                <label class="control-label">Cor</label>
                <input type="color" id="text-color" value="#000000" class="text-input">

                <div style="margin-top: 20px;">
                    <button class="btn-action btn-primary-action" onclick="confirmText()" style="width: 100%;">Adicionar
                        Texto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL GALLERY -->
    <div id="gallery-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Banco de Imagens</h3>
                <button onclick="closeGallery()">X</button>
            </div>
            <div style="padding: 0 15px 10px 15px;">
                <input type="text" id="gallery-search" placeholder="🔍 Buscar imagem pelo nome..."
                    class="gallery-search-bar">
            </div>
            <div id="gallery-grid" class="gallery-grid">
                <!-- JS Items -->
            </div>
        </div>
    </div>

    <!-- PDF/Summary Modal -->
    <div id="summary-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Resumo do Pedido</h3>
                <button onclick="document.getElementById('summary-modal').style.display='none'">X</button>
            </div>
            <div style="padding: 20px;">
                <table class="summary-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid #444;">
                            <th style="text-align: left; padding: 8px;">Item</th>
                            <th style="text-align: left; padding: 8px;">Detalhe</th>
                            <th style="text-align: right; padding: 8px;">R$</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body-modal">
                        <!-- JS Injects Here -->
                    </tbody>
                </table>
                <div style="margin-top: 20px;">
                    <!-- PDF Progress Bar Container -->
                    <div id="pdf-progress-container"
                        style="display:none; margin-bottom: 15px; background: #333; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #444;">
                        <div id="pdf-progress-bar"
                            style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff); transition: width 0.4s ease;">
                        </div>
                    </div>

                    <div style="text-align: right;">
                        <button class="btn-action btn-primary-action" onclick="PDFGenerator.generateBackgroundPDF()"
                            style="width: 100%; padding: 15px; font-weight: bold; font-size: 1rem; border-radius: 8px;">🖨️
                            GERAR FICHA TÉCNICA (PDF EXPERT)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/modules/common/data/fonts-database.js"></script>
    <script src="js/modules/common/data/gallery-database.js"></script>
    <script src="js/modules/common/utils/font-loader.js?v=FIX1"></script>
    <script src="js/modules/common/utils/info-system.js"></script>
    <script src="js/modules/common/utils/help-system.js"></script>
    <script src="js/modules/common/db-adapter.js"></script>
    <script src="js/modules/common/db-integration.js"></script>
    <!-- Common Modules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/modules/auth/supabase-client.js"></script>
    <script src="js/modules/common/supabase-adapter.js?v=2"></script>

    <script src="js/modules/common/database-manager.js"></script>
    <!-- PDF Generation Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/2.8.0/dom-to-image-more.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/2.8.0/dom-to-image-more.min.js"></script>
    <script src="js/modules/common/pdf-generator-v2.js?v=14.25"></script>
    <script src="js/modules/top/state.js?v=14.25"></script>
    <script src="js/modules/top/logic.js?v=14.25"></script>
    <script src="js/modules/top/pricing.js?v=14.25"></script>
    <script src="js/modules/top/visuals.js?v=14.25"></script>
    <script src="js/modules/top/interactions.js?v=14.25"></script>
    <!-- Common UI Components (Module 5) -->
    <script src="js/modules/common/ui-components/ColorPicker.js?v=14.25"></script>
    <script src="js/modules/common/ui-components/ToggleButton.js?v=14.25"></script>
    <script src="js/modules/common/ui-components/SizeSelector.js?v=14.25"></script>
    <script src="js/modules/common/ui-components/ImageUploader.js?v=14.25"></script>
    <script src="js/modules/common/ui-components/TextEditor.js?v=14.25"></script>
    <script src="js/modules/common/utils/OrderNumbers.js?v=14.25"></script>
    <script src="js/modules/common/BaseSimulator.js?v=14.25"></script>
    <script src="js/modules/top/ui-render.js?v=14.25"></script>
    <script src="js/modules/top/TopSimulator.js?v=14.25"></script>
    <script src="js/modules/top/simulator.js?v=14.25"></script>
</body>

</html>
