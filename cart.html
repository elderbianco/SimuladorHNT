<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Pedidos - Hanuthai</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Bebas+Neue&family=Russo+One&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cart-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            width: 90%;
            background: #252525;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            color: #D4AF37;
            font-size: 2.5rem;
        }

        .back-link {
            text-decoration: none;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        .empty-cart {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .cart-table th,
        .cart-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .cart-table th {
            background: #333;
            color: #D4AF37;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .cart-table tr:hover {
            background: #2a2a2a;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #D4AF37;
            color: #000;
        }

        .btn-primary:hover {
            background: #b5952f;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #666;
            color: #ccc;
        }

        .btn-outline:hover {
            border-color: #fff;
            color: #fff;
        }

        .actions-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .summary-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #333;
            padding: 15px;
            border-radius: 4px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        @media (max-width: 768px) {
            .cart-container {
                width: 95%;
                margin: 20px auto;
                padding: 15px;
            }

            .cart-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .summary-stats {
                flex-direction: column;
                gap: 10px;
            }

            .cart-table th,
            .cart-table td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }

            .actions-bar {
                flex-direction: column-reverse;
                gap: 10px;
            }

            .btn {
                width: 100%;
            }

            .cart-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>

<body>
    <header class="premium-header" style="padding: 15px 20px; background: #000;">
        <div class="header-left">
            <a href="index.html" class="nav-icon" title="Voltar ao Início">🏠</a>
        </div>
        <div class="header-center">
            <div class="header-env-title">HANUTHAI - GESTÃO DE PEDIDOS</div>
        </div>
        <div class="header-right">
            <!-- Placeholder for consistency -->
        </div>
    </header>

    <div class="cart-container">
        <div class="cart-header">
            <div>
                <h1>Seus Pedidos Salvos</h1>
                <p style="color:#888; margin-top:5px;">Gerencie e exporte suas simulações</p>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                <a href="javascript:history.back()" class="back-link">↩ Voltar</a>
                <a href="indexCadastro.html?redirect=cart.html" id="link-cadastro" class="btn btn-outline" style="text-decoration: none; font-size: 0.8rem; padding: 5px 10px;">👤 Completar Cadastro</a>
            </div>
        </div>

        <div id="cart-content">
            <!-- JS will populate this -->
            <div class="empty-cart">
                <h2>Seu carrinho está vazio</h2>
                <p>Faça uma simulação e clique em "Adicionar ao Carrinho".</p>
                <a href="IndexFightShorts.html" class="btn btn-primary"
                    style="text-decoration:none; margin-top:15px; display:inline-block;">Ir para Simulador</a>
            </div>
        </div>

        <div id="cart-actions" class="actions-bar" style="display:none;">
            <button id="btn-clear-cart" class="btn btn-outline" style="color:#ff6b6b; border-color:#ff6b6b;">🗑️ Limpar
                Tudo</button>
            <button id="btn-export-excel" class="btn btn-primary">📊 Baixar Excel Geral</button>
        </div>
    </div>

    <!-- SheetJS for Excel Export -->
    <script defer src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script defer src="js/modules/common/db-integration.js"></script>
    <script defer src="js/modules/common/cart-legacy.js"></script>
</body>

</html>
