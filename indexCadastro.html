<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Hanuthai</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Bebas+Neue&family=Russo+One&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/common.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --dark-bg: #000;
            --card-bg: #0a0a0a;
            --input-bg: #111;
            --border: #222;
            --text-muted: #666;
            --accent-blue: #00b4d8;
            --radius: 12px;
        }

        body {
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        .premium-header {
            width: 100%;
            background: #000;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            color: var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        /* --- FORM CONTAINER --- */
        .form-container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .form-section {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .section-title {
            color: var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- INPUTS --- */
        .input-group {
            margin-bottom: 25px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
            background: #151515;
        }

        .input-field::placeholder {
            color: #444;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* --- SELECTS --- */
        select.input-field {
            appearance: none;
            cursor: pointer;
        }

        /* --- CHECKBOXES --- */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .checkbox-field {
            width: 20px;
            height: 20px;
            accent-color: var(--gold);
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-label {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.4;
        }

        .checkbox-label a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        .checkbox-label a:hover {
            border-bottom-color: var(--gold);
        }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .form-container {
                padding: 25px;
                margin: 20px auto;
            }

            .input-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .header-title {
                font-size: 1.5rem;
            }
        }

        /* Mobile Adjustments for Small Screens */
        /* --- SOCIAL BUTTONS --- */
        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-google:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            color: #444;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #222;
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }
    </style>
</head>

<body>

    <header class="premium-header">
        <div class="header-title">HANUTHAI - CADASTRO DE CLIENTE</div>
    </header>

    <div class="form-container">
        <!-- Google Login -->
        <button id="btn-google-login" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo"
                style="width: 20px;">
            CONTINUAR COM O GOOGLE
        </button>

        <div class="divider">ou preencha manualmente</div>

        <form id="cadastro-form">

            <!-- SEÇÃO 1: PRIVACIDADE -->
            <div class="form-section">
                <div class="section-title">🛡️ Termos e Privacidade</div>

                <div class="input-group">
                    <label class="input-label" for="email">E-mail para Contato</label>
                    <input type="email" id="email" class="input-field" placeholder="seuemail@exemplo.com" required>
                </div>

                <label class="checkbox-group">
                    <input type="checkbox" id="privacy-policy" class="checkbox-field" required>
                    <span class="checkbox-label">
                        Declaro que li, compreendi e concordo integralmente com os termos da
                        <a href="https://docs.google.com/document/d/18MZF45XqKZ3UTCVJVQcWGWUBiB1XHMpgOYdyVA_cZoQ/edit?usp=sharing"
                            target="_blank">Política de Privacidade</a>.
                    </span>
                </label>
            </div>

            <!-- SEÇÃO 2: DADOS PESSOAIS -->
            <div class="form-section">
                <div class="section-title">👤 Identificação</div>

                <div class="input-group">
                    <label class="input-label" for="full-name">Nome Completo</label>
                    <input type="text" id="full-name" class="input-field" placeholder="Insira seu nome completo"
                        required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label" for="document">CPF ou CNPJ (apenas números)</label>
                        <input type="text" id="document" class="input-field"
                            placeholder="000.000.000-00 ou 00.000.000/0000-00" maxlength="18" required>
                        <div id="document-error"
                            style="color: #ff4d4d; font-size: 0.75rem; margin-top: 5px; display: none;">Documento
                            inválido. Verifique os números.</div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="ie">Inscrição Estadual (Opcional)</label>
                        <input type="text" id="ie" class="input-field" placeholder="Isento ou Número">
                    </div>
                </div>
            </div>

            <!-- SEÇÃO 3: ENDEREÇO -->
            <div class="form-section">
                <div class="section-title">📍 Endereço de Entrega</div>

                <div class="input-group">
                    <label class="input-label" for="zipcode">CEP (Preenchimento Automático)</label>
                    <input type="text" id="zipcode" class="input-field" placeholder="00000-000" maxlength="9" required
                        style="border-left: 4px solid var(--accent-blue);">
                </div>

                <div class="input-row">
                    <div class="input-group" style="grid-column: span 2;">
                        <label class="input-label" for="address">Logradouro (Rua, Avenida, etc.)</label>
                        <input type="text" id="address" class="input-field" placeholder="Aguardando CEP..." required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label" for="number">Número</label>
                        <input type="text" id="number" class="input-field" placeholder="Ex: 123" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="complement">Complemento</label>
                        <input type="text" id="complement" class="input-field" placeholder="Apto, Sala, Loja, etc.">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label" for="neighborhood">Bairro</label>
                        <input type="text" id="neighborhood" class="input-field" placeholder="Bairro" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="city">Cidade</label>
                        <input type="text" id="city" class="input-field" placeholder="Cidade" required>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="state">Estado (UF)</label>
                    <select id="state" class="input-field" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC" selected>Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>
            </div>

            <!-- SEÇÃO 4: CONTATO -->
            <div class="form-section">
                <div class="section-title">📱 Contato Final</div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label" for="whatsapp">WhatsApp (Celular)</label>
                        <input type="text" id="whatsapp" class="input-field" placeholder="(00) 00000-0000"
                            maxlength="15" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="phone">Telefone Fixo / Recado</label>
                        <input type="text" id="phone" class="input-field" placeholder="(00) 0000-0000">
                    </div>
                </div>

                <label class="checkbox-group">
                    <input type="checkbox" id="marketing" class="checkbox-field">
                    <span class="checkbox-label">Concordo em receber informações sobre produtos e promoções através dos
                        canais informados.</span>
                </label>
            </div>

            <button type="submit" class="btn-submit">🚀 SALVAR E IR PARA O CARRINHO</button>
        </form>
    </div>

    <!-- Supabase Integration -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/modules/auth/supabase-client.js"></script>

    <!-- External Dependencies -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/imask"></script>

    <!-- App Modular Scripts -->
    <script src="js/modules/auth/supabase-client.js"></script>
    <script src="js/modules/registration/registration-validation.js"></script>
    <script src="js/modules/registration/registration-api.js"></script>
    <script src="js/modules/registration/registration-controller.js"></script>
</body>

</html>
