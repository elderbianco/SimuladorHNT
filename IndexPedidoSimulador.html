<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pedidos - Hanuthai</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Bebas+Neue&family=Russo+One&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/common.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --card-hover: #1c1c1c;
            --border: #222;
            --text-muted: #666;
            --accent-blue: #00b4d8;
            --radius-md: 8px;
        }

        body {
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- MODERN SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* --- HEADER --- */
        .premium-header {
            background: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            color: var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        /* --- MAIN TABS (DASHBOARD) --- */
        .main-tabs-nav {
            display: flex;
            background: #000;
            padding: 0 20px;
            gap: 10px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 65px;
            z-index: 999;
            overflow-x: auto;
        }

        .main-tab-btn {
            padding: 15px 25px;
            background: transparent;
            border: none;
            color: #555;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
            white-space: nowrap;
        }

        .main-tab-btn:hover {
            color: #ccc;
        }

        .main-tab-btn.active {
            color: var(--gold);
        }

        .main-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        .main-tab-content {
            display: none;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease;
        }

        .main-tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- DASHBOARD ELEMENTS --- */
        .section-header {
            margin-bottom: 25px;
            border-left: 4px solid var(--gold);
            padding-left: 15px;
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin: 0;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 5px 0 0;
        }

        /* Cards & Grids */
        .card-dark {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 25px;
            margin-bottom: 20px;
        }

        /* Stats Bar */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #151515 0%, #0a0a0a 100%);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-blue);
        }

        .stat-card.gold::before {
            background: var(--gold);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-modern {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-modern:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .card-header {
            padding: 20px;
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 100px 50px;
            gap: 20px;
            align-items: center;
            background: #2a2a2a;
            cursor: pointer;
        }

        /* Conflict Fix: !important used to override common.css if needed */
        .expanded .card-details {
            display: block;
        }

        /* HIDDEN ELEMENTS ALERTS */
        /* Alerta para desenvolvedor: Os botões de exportação foram suprimidos a pedido do usuário. 
           Se não forem reativados em abas futuras, devem ser removidos do código permanentemente. */
        .suppressed-actions {
            display: none;
        }

        /* --- MOBILE ADAPTATION (Accordion Experience) --- */
        @media (max-width: 768px) {
            .main-tabs-nav {
                padding: 0 10px;
                gap: 5px;
            }

            .main-tab-btn {
                padding: 12px 15px;
                font-size: 1rem;
            }

            .main-tab-content {
                padding: 20px 15px;
            }

            .card-header {
                grid-template-columns: 50px 1fr 40px !important;
                padding: 15px !important;
            }

            .card-header div:nth-child(3),
            .card-header div:nth-child(4),
            .card-header div:nth-child(5) {
                display: none !important;
            }

            .sub-item-rich .card-header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 10px;
            }
        }

        /* Quick-Access Navigator (Floating) */
        .quick-nav {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .quick-nav-item {
            width: 45px;
            height: 45px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .quick-nav-item:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }
    </style>
</head>

<body>

    <!-- Quick Navigator (Floating) -->
    <div class="quick-nav">
        <a href="IndexFightShorts.html" class="quick-nav-item" title="Fight Shorts"><img
                src="assets/ui-icons/icon-fight-shorts.png" alt="FS" style="width:24px;"></a>
        <a href="IndexShortsLegging.html" class="quick-nav-item" title="Shorts Legging"><img
                src="assets/ui-icons/icon-shorts-calca-legging.png" alt="SL" style="width:24px;"></a>
        <a href="IndexCalcaLegging.html" class="quick-nav-item" title="Calça Legging"><img
                src="assets/ui-icons/icon-calca-legging.png" alt="CL" style="width:24px;"></a>
        <a href="IndexMoletom.html" class="quick-nav-item" title="Moletom"><img src="assets/ui-icons/icon-moletom.png"
                alt="ML" style="width:24px;"></a>
        <a href="IndexTop.html" class="quick-nav-item" title="Top"><img src="assets/ui-icons/icon-top.png" alt="TP"
                style="width:24px;"></a>
        <a href="index.html" class="quick-nav-item" title="Início">🏠</a>
    </div>

    <header class="premium-header">
        <div style="display:flex; align-items:center; gap:20px;">
            <a href="index.html" style="text-decoration:none; transform: scale(1.5);">🏠</a>
            <div class="header-title">HANUTHAI DASHBOARD</div>
        </div>
    </header>

    <div class="dashboard-container">

        <div class="page-header">
            <div>
                <h1>Gestão de Pedidos</h1>
                <p style="color:#888; margin-top:5px;">Agrupamento inteligente por cliente e simulação</p>
            </div>
            <div class="actions">
                <button id="btn-clear-all" class="btn btn-outline" style="margin-right: 10px;">🗑️ Limpar Tudo</button>
                <button id="btn-export-db" class="btn btn-primary"
                    onclick="if(typeof DatabaseManager !== 'undefined') DatabaseManager.exportToExcel(); else alert('Erro: DatabaseManager não carregado.');"
                    style="background:#28a745; margin-right: 10px;">📊 Baixar Banco de Dados (Excel)</button>
                <button id="btn-export-all" class="btn btn-primary">📤 Exportar Planilha de Produção</button>
            </div>
        </div>

        <!-- NEW: Global Order Header (Editable if needed, or summary) -->
        <div class="order-global-info"
            style="background: #222; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 30px; border-left: 5px solid var(--gold);">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end;">
                <div>
                    <label
                        style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Número
                        do Pedido (Geral)</label>
                    <input type="text" id="global-order-id" placeholder="Ex: PED-2024-001"
                        style="width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: var(--gold); font-size: 1.2rem; font-weight: bold; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">
                </div>
                <div>
                    <label
                        style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Nome
                        do Cliente / Empresa</label>
                    <input type="text" id="global-client-name" placeholder="Nome para o cliente..."
                        style="width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; font-size: 1rem;">
                </div>
                <div>
                    <label
                        style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Telefone
                        / WhatsApp</label>
                    <input type="text" id="global-client-phone" placeholder="(00) 00000-0000"
                        style="width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; font-size: 1rem;">
                </div>
                <div>
                    <button class="btn btn-primary" style="height: 46px;" onclick="applyGlobalInfo()">✅ Aplicar aos
                        Itens</button>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Itens no Carrinho</div>
                <div class="stat-value" id="st-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Quantidade de Peças</div>
                <div class="stat-value" id="st-pieces">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Valor Total Estimado</div>
                <div class="stat-value gold" id="st-total">R$ 0,00</div>
            </div>
        </div>

        <div id="orders-list">
            <!-- JS RENDERS CARDS HERE -->
            <div class="empty-state">
                <h2>Seu carrinho está vazio</h2>
                <p>Nenhuma simulação encontrada.</p>
                <br>
                <a href="IndexFightShorts.html" class="btn btn-primary">Ir para Simulador</a>
            </div>
        </div>

    </div>

    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/modules/auth/supabase-client.js"></script>
    <script src="js/modules/common/supabase-adapter.js?v=10"></script>

    <!-- Logic -->
    <script src="js/modules/common/pdf-generator-v2.js?v=12"></script>
    <script src="js/modules/common/db-integration.js?v=12"></script>
    <script src="js/modules/common/database-manager.js"></script>
    <script src="js/modules/common/supabase-adapter.js?v=12"></script>
    <script src="js/modules/cart/cart-ui.js?v=12"></script>
    <script src="js/modules/cart/cart-controller.js?v=12"></script>
    <script src="js/modules/common/ui/draggable-nav.js"></script>
</body>

</html>
